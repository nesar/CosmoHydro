# Trial: GSMF + CGD + fGas, all 7 parameters (5 subgrid + 2 cosmo).
# Truncated-Gaussian Planck 2018 prior on the cosmology parameters,
# default wide Gaussian on subgrid params (with eps_kin flat — matches GSMF_CGD_fGas_7p).
trial_name: GSMF_CGD_fGas_7p_planck

observables:
  - GSMF
  - CGD
  - fGas

param_mode: subgrid+cosmo
fixed_params: {}
bias_params: []

# eps_kin (index 4) keeps flat prior (matches GSMF_CGD_fGas_7p.yaml)
flat_prior_indices: [4]

# Truncated-Gaussian "Planck 2018" prior on cosmology only.
gaussian_priors:
  omega_m: {mu: 0.143, sigma: 0.001}
  sigma_8: {mu: 0.811, sigma: 0.006}

mcmc:
  nwalkers: 400
  nburn: 100
  nrun: 4000
  parallel: true

data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0
  model_dir: ../models/

obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/

output_dir: results/
