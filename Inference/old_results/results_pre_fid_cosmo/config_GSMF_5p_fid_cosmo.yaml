# Trial: GSMF only, 5 subgrid params free, cosmology fixed at HACC fiducial.
# Designed to reproduce the old mcmc_hacc.py / gp_HACC_mcmc_universal.py result
# (the gray "L_GSMF only" contour in Flamingo/Clean/plots/a2/multi.png).
#
# Cosmology fixed at the design midpoint (omega_m*h^2=0.1375, sigma_8=0.8),
# which matches HACC's fiducial cosmology (h=0.681 -> Omega_m ~ 0.296).
# Subgrid prior is Gaussian centered at the design midpoint with sigma=half-range,
# and eps_kin (index 4) has a flat prior — matching mcmc_hacc.py ln_prior().
trial_name: GSMF_5p_fid_cosmo

observables:
  - GSMF

param_mode: subgrid
fixed_params: {}
bias_params: []

# eps_kin (index 4) flat, all others Gaussian — same as old mcmc_hacc.py
flat_prior_indices: [4]

mcmc:
  nwalkers: 400
  nburn: 100
  nrun: 4000
  parallel: true

data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0
  model_dir: ../models/

obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/

output_dir: results/
