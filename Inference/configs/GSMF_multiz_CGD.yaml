# Trial: GSMF at z=0 and z=1 combined with CGD at z=0.4
trial_name: GSMF_multiz_CGD

# Per-observable redshift specification
# Each entry needs 'name' and optionally 'redshift' (default: 0.0)
# The same observable can appear multiple times at different redshifts
observables:
  - name: GSMF
    redshift: 0.0
  - name: GSMF
    redshift: 1.0
  - name: CGD
    redshift: 0.4

param_mode: subgrid+cosmo
fixed_params: {}
bias_params: []
flat_prior_indices: []

mcmc:
  nwalkers: 100
  nburn: 200
  nrun: 4000
  parallel: true

data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0       # used for z=0 observables
  model_dir: ../models/

obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/

output_dir: results/
