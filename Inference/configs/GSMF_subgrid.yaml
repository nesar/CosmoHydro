# Trial: GSMF only, subgrid parameters only
trial_name: GSMF_subgrid

# --- Observables to constrain ---
# Available: GSMF, fGas, CGD, HMF, Pk, CSFR, CGED
observables:
  - GSMF

# --- Parameter space ---
# Which parameters to vary: "subgrid", "cosmo", "subgrid+cosmo", or "custom"
param_mode: subgrid

# Optional: fix specific parameters (by PARAM_NAME latex label or short key)
# Values should be in scaled units (same as emulator input).
# Cosmology fixed at the project fiducial (Omega_cdm=0.26067, Omega_b*h^2=0.02242,
# H0=67.66, sigma_8=0.8102 -> omega_m=0.14176, sigma_8=0.8102).
fixed_params:
  omega_m: 0.14176
  sigma_8: 0.8102

# Optional: extra bias parameters to include
# Available: log_bstar, bCV, bHSE
bias_params: []

# Optional: indices of params that get flat priors (0-indexed into free params)
# If omitted, all free params get Gaussian priors
flat_prior_indices: []

# --- MCMC settings ---
mcmc:
  nwalkers: 400
  nburn: 100
  nrun: 4000
  parallel: true     # use multiprocessing Pool

# --- Data settings ---
data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0
  model_dir: ../models/

# --- Observational data directories ---
obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  fgas: null
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/
  cged: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasElectronDensityProfile/data/

# --- Output ---
output_dir: results/
