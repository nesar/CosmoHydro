# Trial: GSMF + CGD with bias parameters, subgrid + cosmo
trial_name: GSMF_CGD_bias

observables:
  - GSMF
  - CGD

param_mode: subgrid+cosmo
fixed_params: {}

# Include observational bias parameters
bias_params:
  - name: log_bstar
    initial: 0.0
    min: -0.14
    max: 0.14
  - name: bCV
    initial: 1.0
    min: 0.94
    max: 1.06
  - name: bHSE
    initial: 0.74
    min: 0.64
    max: 0.84

# Flat priors on eps_kin (index 4) and all bias params (indices 7,8,9)
flat_prior_indices: [4, 7, 8, 9]

mcmc:
  nwalkers: 100
  nburn: 200
  nrun: 4000
  parallel: true

data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0
  model_dir: ../models/

obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/

output_dir: ../results/
