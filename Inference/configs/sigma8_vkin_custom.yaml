# Trial: Custom parameter space — only sigma8 + kinetic feedback params
trial_name: sigma8_vkin_custom

observables:
  - GSMF
  - CGD

param_mode: custom
# Specify exactly which parameters to vary (by short key)
# Available keys: kappa_w, e_w, M_seed, v_kin, eps_kin, omega_m, sigma_8
free_params:
  - v_kin
  - eps_kin
  - sigma_8

# Fix all other parameters at these values (scaled units)
fixed_params:
  kappa_w: 3.0
  e_w: 0.5
  M_seed: 0.8       # 8e5 / 1e6
  omega_m: 0.1375

bias_params: []
flat_prior_indices: []

mcmc:
  nwalkers: 400
  nburn: 100
  nrun: 4000
  parallel: true

data:
  DirIn: ../data/400MPC_RUNS_5SG_2COSMO_PARAM/HAvoCC/
  design_file: ../data/FinalDesign.txt
  num_sims: 39
  start_sim_idx: 1
  exp_variance: 0.95
  z_index: 0
  model_dir: ../models/

obs_dirs:
  gsmf: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/galaxy_modules/GalStellarMassFunction/data/
  cgd: /home/nramachandra/Projects/Hydro_runs/HAvoCC/havocc/analysis/modules/halo_profile_modules/ClusterGasDensityProfile/data/

output_dir: results/
